name: Pull Request Checks

on:
  pull_request:
    branches: [main, develop, testing, staging, production]
  push:
    branches: [main, develop, testing, staging, production]

env:
  FLUTTER_VERSION: '3.44.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check public repository safety
        run: bash scripts/check-public-repo.sh

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Check for outdated dependencies
        run: flutter pub outdated
        continue-on-error: true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  cloud-backend:
    name: Backend and Cloud Checks
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Validate Supabase schema
        run: |
          test -f supabase/schema.sql
          grep -q "create table if not exists public.users" supabase/schema.sql
          grep -q "create table if not exists public.logs" supabase/schema.sql
          grep -q "create table if not exists public.schedules" supabase/schema.sql
          grep -q "create table if not exists public.medication_events" supabase/schema.sql
          grep -q "create table if not exists public.sync_tombstones" supabase/schema.sql
          grep -q "create table if not exists public.community_posts" supabase/schema.sql
          grep -q "create or replace function public.apply_health_mutations" supabase/schema.sql
          grep -q "alter table public.users enable row level security" supabase/schema.sql
          grep -q "alter table public.logs enable row level security" supabase/schema.sql
          grep -q "create policy users_select_own" supabase/schema.sql
          grep -q "create policy logs_insert_own" supabase/schema.sql
          grep -q "create policy schedules_insert_own" supabase/schema.sql
          grep -q "create policy medication_events_insert_own" supabase/schema.sql

      - name: Analyze cloud backend sources
        run: |
          flutter analyze --fatal-infos \
            lib/config/backend_config.dart \
            lib/services/cloud_backend_service.dart \
            lib/singleton.dart

      - name: Test Supabase dart-define configuration
        run: |
          flutter test test/cloud_backend_config_test.dart \
            --dart-define=BACKEND_PROVIDER=supabase \
            --dart-define=SUPABASE_URL=https://example.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=ci-placeholder-anon-key

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [analyze, test, cloud-backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: [analyze, test, cloud-backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS simulator (debug)
        run: flutter build ios --simulator --debug

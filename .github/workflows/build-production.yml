name: Build Production

on:
  push:
    branches: [production]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  validate-production:
    name: Validate Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check public repository safety
        run: bash scripts/check-public-repo.sh

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test

      - name: Analyze app
        run: flutter analyze --fatal-infos

      - name: Validate Supabase schema
        run: |
          test -f supabase/schema.sql
          grep -q "create table if not exists public.users" supabase/schema.sql
          grep -q "create table if not exists public.logs" supabase/schema.sql
          grep -q "create table if not exists public.schedules" supabase/schema.sql
          grep -q "create table if not exists public.recovery_sessions" supabase/schema.sql
          grep -q "create table if not exists public.medication_events" supabase/schema.sql
          grep -q "create table if not exists public.sync_tombstones" supabase/schema.sql
          grep -q "create table if not exists public.community_posts" supabase/schema.sql
          grep -q "create or replace function public.apply_health_mutations" supabase/schema.sql
          grep -q "alter table public.users enable row level security" supabase/schema.sql
          grep -q "alter table public.logs enable row level security" supabase/schema.sql
          grep -q "alter table public.recovery_sessions enable row level security" supabase/schema.sql
          grep -q "create policy users_select_own" supabase/schema.sql
          grep -q "create policy logs_insert_own" supabase/schema.sql
          grep -q "create policy schedules_insert_own" supabase/schema.sql
          grep -q "create policy recovery_sessions_insert_own" supabase/schema.sql
          grep -q "create policy medication_events_insert_own" supabase/schema.sql
          test -f supabase/seed.sql
          grep -q "demo-recovery-001" supabase/seed.sql

      - name: Test cloud config
        run: |
          flutter test test/cloud_backend_config_test.dart \
            --dart-define=ENVIRONMENT=production \
            --dart-define=BACKEND_PROVIDER=supabase \
            --dart-define=SUPABASE_URL=https://example.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=ci-placeholder-anon-key

      - name: Run tests
        run: flutter test

  build-android-production:
    name: Build Android (Production)
    runs-on: ubuntu-latest
    environment: production
    needs: validate-production
    env:
      BACKEND_PROVIDER: ${{ vars.BACKEND_PROVIDER || 'none' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_AUTH_REDIRECT_URL: ${{ vars.SUPABASE_AUTH_REDIRECT_URL || 'com.parkiwell.app://login-callback/' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Validate production backend configuration
        run: |
          if [ "$BACKEND_PROVIDER" != "supabase" ]; then
            echo "::error::BACKEND_PROVIDER must be set to supabase for production builds."
            exit 1
          fi
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL and SUPABASE_ANON_KEY are required for production builds."
            exit 1
          fi

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_STORE_PASSWORD" ] || [ -z "$ANDROID_KEY_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "::error::Production Android signing requires ANDROID_KEYSTORE_BASE64, ANDROID_STORE_PASSWORD, ANDROID_KEY_PASSWORD, and ANDROID_KEY_ALIAS."
            exit 1
          fi
          echo -n "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          echo "storePassword=$ANDROID_STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$ANDROID_KEY_ALIAS" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            pubspec_version=$(awk '/^version:/{print $2; exit}' pubspec.yaml)
            echo "version=${pubspec_version%%+*}" >> $GITHUB_OUTPUT
          fi

      - name: Build App Bundle (Production)
        run: |
          flutter build appbundle --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ github.run_number }} \
            --dart-define=ENVIRONMENT=production \
            "--dart-define=BACKEND_PROVIDER=$BACKEND_PROVIDER" \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            "--dart-define=SUPABASE_AUTH_REDIRECT_URL=$SUPABASE_AUTH_REDIRECT_URL"

      - name: Build APK (Production)
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ github.run_number }} \
            --dart-define=ENVIRONMENT=production \
            "--dart-define=BACKEND_PROVIDER=$BACKEND_PROVIDER" \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            "--dart-define=SUPABASE_AUTH_REDIRECT_URL=$SUPABASE_AUTH_REDIRECT_URL"

      - name: Upload App Bundle
        uses: actions/upload-artifact@v6
        with:
          name: production-aab-${{ steps.version.outputs.version }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: production-apk-${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

  build-ios-production:
    name: Build iOS (Production)
    runs-on: macos-latest
    environment: production
    needs: validate-production
    env:
      BACKEND_PROVIDER: ${{ vars.BACKEND_PROVIDER || 'none' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_AUTH_REDIRECT_URL: ${{ vars.SUPABASE_AUTH_REDIRECT_URL || 'com.parkiwell.app://login-callback/' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Validate production backend configuration
        run: |
          if [ "$BACKEND_PROVIDER" != "supabase" ]; then
            echo "::error::BACKEND_PROVIDER must be set to supabase for production builds."
            exit 1
          fi
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL and SUPABASE_ANON_KEY are required for production builds."
            exit 1
          fi

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            pubspec_version=$(awk '/^version:/{print $2; exit}' pubspec.yaml)
            echo "version=${pubspec_version%%+*}" >> $GITHUB_OUTPUT
          fi

      - name: Install Apple certificate and provisioning profile
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVISIONING_PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ] || [ -z "$APPLE_PROVISIONING_PROFILE_BASE64" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_PROVISIONING_PROFILE_NAME" ] || [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "::error::Production iOS signing secrets and provisioning metadata are incomplete."
            exit 1
          fi

          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate and provisioning profile from secrets
          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build iOS (Production)
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ github.run_number }} \
            --dart-define=ENVIRONMENT=production \
            "--dart-define=BACKEND_PROVIDER=$BACKEND_PROVIDER" \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            "--dart-define=SUPABASE_AUTH_REDIRECT_URL=$SUPABASE_AUTH_REDIRECT_URL"

      - name: Generate ExportOptions.plist
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVISIONING_PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "No Apple signing certificate configured; skipping ExportOptions.plist."
            exit 0
          fi
          cat > ios/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>uploadSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.parkiwell.app</key>
              <string>${APPLE_PROVISIONING_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          PLIST

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ github.run_number }} \
            --dart-define=ENVIRONMENT=production \
            "--dart-define=BACKEND_PROVIDER=$BACKEND_PROVIDER" \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            "--dart-define=SUPABASE_AUTH_REDIRECT_URL=$SUPABASE_AUTH_REDIRECT_URL" \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload iOS build
        uses: actions/upload-artifact@v6
        with:
          name: production-ios-${{ steps.version.outputs.version }}
          path: |
            build/ios/ipa/*.ipa
            build/ios/archive/*.xcarchive
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android-production, build-ios-production]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: production-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.apk
            *.aab
            *.ipa
          generate_release_notes: true
          draft: true

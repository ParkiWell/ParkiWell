name: Build Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  validate-staging:
    name: Validate Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check public repository safety
        run: bash scripts/check-public-repo.sh

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test

      - name: Analyze app
        run: flutter analyze --fatal-infos

      - name: Validate Supabase schema
        run: |
          test -f supabase/schema.sql
          grep -q "create table if not exists public.users" supabase/schema.sql
          grep -q "create table if not exists public.logs" supabase/schema.sql
          grep -q "create table if not exists public.schedules" supabase/schema.sql
          grep -q "create table if not exists public.medication_events" supabase/schema.sql
          grep -q "create table if not exists public.sync_tombstones" supabase/schema.sql
          grep -q "create table if not exists public.community_posts" supabase/schema.sql
          grep -q "create or replace function public.apply_health_mutations" supabase/schema.sql
          grep -q "alter table public.users enable row level security" supabase/schema.sql
          grep -q "alter table public.logs enable row level security" supabase/schema.sql
          grep -q "create policy users_select_own" supabase/schema.sql
          grep -q "create policy logs_insert_own" supabase/schema.sql
          grep -q "create policy schedules_insert_own" supabase/schema.sql
          grep -q "create policy medication_events_insert_own" supabase/schema.sql

      - name: Test cloud config
        run: |
          flutter test test/cloud_backend_config_test.dart \
            --dart-define=ENVIRONMENT=staging \
            --dart-define=BACKEND_PROVIDER=supabase \
            --dart-define=SUPABASE_URL=https://example.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=ci-placeholder-anon-key

      - name: Run tests
        run: flutter test

  build-android-staging:
    name: Build Android (Staging)
    runs-on: ubuntu-latest
    environment: staging
    needs: validate-staging
    env:
      BACKEND_PROVIDER: ${{ vars.BACKEND_PROVIDER || 'none' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_AUTH_REDIRECT_URL: ${{ vars.SUPABASE_AUTH_REDIRECT_URL || 'com.parkiwell.app://login-callback/' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] && [ -z "$ANDROID_STORE_PASSWORD" ] && [ -z "$ANDROID_KEY_PASSWORD" ] && [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "No Android signing secrets configured; using default debug signing."
            exit 0
          fi
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_STORE_PASSWORD" ] || [ -z "$ANDROID_KEY_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "::error::Android signing secrets are incomplete. Set ANDROID_KEYSTORE_BASE64, ANDROID_STORE_PASSWORD, ANDROID_KEY_PASSWORD, and ANDROID_KEY_ALIAS."
            exit 1
          fi
          echo -n "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          echo "storePassword=$ANDROID_STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$ANDROID_KEY_ALIAS" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Build APK (Staging)
        run: |
          flutter build apk --release \
            --build-name=1.0.0-staging \
            --build-number=${{ github.run_number }} \
            --dart-define=ENVIRONMENT=staging \
            "--dart-define=BACKEND_PROVIDER=$BACKEND_PROVIDER" \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            "--dart-define=SUPABASE_AUTH_REDIRECT_URL=$SUPABASE_AUTH_REDIRECT_URL"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: staging-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  build-ios-staging:
    name: Build iOS (Staging)
    runs-on: macos-latest
    environment: staging
    needs: validate-staging
    env:
      BACKEND_PROVIDER: ${{ vars.BACKEND_PROVIDER || 'none' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_AUTH_REDIRECT_URL: ${{ vars.SUPABASE_AUTH_REDIRECT_URL || 'com.parkiwell.app://login-callback/' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (Staging)
        run: |
          flutter build ios --release --no-codesign \
            --build-name=1.0.0-staging \
            --build-number=${{ github.run_number }} \
            --dart-define=ENVIRONMENT=staging \
            "--dart-define=BACKEND_PROVIDER=$BACKEND_PROVIDER" \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            "--dart-define=SUPABASE_AUTH_REDIRECT_URL=$SUPABASE_AUTH_REDIRECT_URL"

      - name: Archive iOS build
        run: |
          cd build/ios/iphoneos
          zip -r ../../../ios-staging-build.zip Runner.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: staging-ios-${{ github.run_number }}
          path: ios-staging-build.zip
          retention-days: 14

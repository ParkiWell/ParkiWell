name: Build Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.38.6'

jobs:
  build-android-staging:
    name: Build Android (Staging)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        if: ${{ secrets.ANDROID_KEY_ALIAS != '' }}
        run: |
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Build APK (Staging)
        run: |
          flutter build apk --release \
            --build-name=1.0.0-staging \
            --build-number=${{ github.run_number }} \
            --dart-define=ENVIRONMENT=staging

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: staging-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  build-ios-staging:
    name: Build iOS (Staging)
    runs-on: macos-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (Staging)
        run: |
          flutter build ios --release --no-codesign \
            --build-name=1.0.0-staging \
            --build-number=${{ github.run_number }} \
            --dart-define=ENVIRONMENT=staging

      - name: Archive iOS build
        run: |
          cd build/ios/iphoneos
          zip -r ../../../ios-staging-build.zip Runner.app
        continue-on-error: true

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: staging-ios-${{ github.run_number }}
          path: ios-staging-build.zip
          retention-days: 14
        continue-on-error: true
